name: js CI

on:
  push:
    branches: [main]
    paths: ["js/**", ".github/workflows/js-ci.yml"]
  pull_request:
    paths: ["js/**", ".github/workflows/js-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
